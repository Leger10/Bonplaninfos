[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  targetPort = 3000

# En-têtes de sécurité pour tous les chemins
[[headers]]
  for = "/*"
  [headers.values]
    # Empêche le clickjacking (interdit d'afficher le site dans un iframe)
    X-Frame-Options = "DENY"
    
    # Empêche les navigateurs de faire du MIME sniffing
    X-Content-Type-Options = "nosniff"
    
    # Force HTTPS pour 1 an (améliore le SEO et la sécurité)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Contrôle les informations de référent (protection vie privée)
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Content Security Policy (CSP) - Protection contre les attaques XSS
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://jdeuwvaauerzjdtpwjjz.supabase.co https://api.country.is https://www.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Pour les fichiers statiques (images, CSS, JS) - cache optimisé
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pour les pages HTML (ne pas mettre en cache)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, private"
    Pragma = "no-cache"
    Expires = "0"

# Pour les fichiers sensibles (manifest.json, robots.txt, sitemap.xml)
[[headers]]
  for = "/(manifest.json|robots.txt|sitemap.xml)"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Content-Type-Options = "nosniff"